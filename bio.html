<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio-Optimierer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #100012;
    --bg-elevated: #1a0220;
    --bg-card: #1f0428;
    --accent: #e98b9e;
    --accent-soft: rgba(233, 139, 158, 0.12);
    --accent-border: rgba(233, 139, 158, 0.25);
    --btn: #950032;
    --btn-hover: #b30040;
    --text: #f5ecef;
    --text-muted: #a89199;
    --text-dim: #6b5862;
    --border: rgba(233, 139, 158, 0.15);
    --good: #9fd4a8;
    --bad: #ff9b9b;

    --shadow-card:
      0 1px 0 rgba(233, 139, 158, 0.04) inset,
      0 14px 34px -16px rgba(0, 0, 0, 0.75),
      0 28px 60px -28px rgba(149, 0, 50, 0.35);
    --shadow-card-hover:
      0 1px 0 rgba(233, 139, 158, 0.08) inset,
      0 18px 40px -16px rgba(0, 0, 0, 0.85),
      0 34px 70px -28px rgba(149, 0, 50, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 48px 24px 32px;
    background:
      radial-gradient(circle at 20% 0%, rgba(149, 0, 50, 0.18), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(233, 139, 158, 0.1), transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }

  .container { max-width: 760px; margin: 0 auto; }

  /* ---------- Top Nav ---------- */
  .topnav {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .topnav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    transition: color 0.15s, border-color 0.15s;
  }
  .topnav a:hover {
    color: var(--accent);
    border-color: var(--accent-border);
  }
  .topnav a::before {
    content: '←  ';
    color: var(--text-dim);
  }
  .topnav a:hover::before { color: var(--accent); }

  header {
    text-align: center;
    margin-bottom: 34px;
  }

  .brand-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    box-shadow: 0 0 16px var(--accent);
  }

  .eyebrow {
    display: inline-block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1.02rem;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ---------- Karte ---------- */
  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-card);
  }

  .field { margin-bottom: 22px; }
  .field:last-of-type { margin-bottom: 28px; }

  .field-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .field-head label { margin-bottom: 0; }

  .char-counter {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .char-counter.over { color: var(--bad); }
  .char-counter.warn { color: #f2c779; }

  input[type="text"], textarea, select {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 0.98rem;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
  textarea.bio-textarea { min-height: 110px; font-family: inherit; }
  select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23e98b9e' stroke-width='2.5'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 44px;
    cursor: pointer;
  }
  select option { background: var(--bg-card); color: var(--text); }

  button.primary {
    width: 100%;
    padding: 16px 22px;
    background: var(--btn);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  button.primary:hover:not(:disabled) {
    background: var(--btn-hover);
    box-shadow: 0 8px 24px rgba(149, 0, 50, 0.4);
    transform: translateY(-1px);
  }
  button.primary:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---------- Ergebnis ---------- */
  .results { display: none; margin-top: 10px; }
  .results.show { display: block; }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .results-header h2 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
  }

  /* --- Analyse --- */
  .analysis-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 26px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .analysis-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .analysis-title::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--accent);
  }
  .analysis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .analysis-col h4 {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .analysis-col.works h4 { color: var(--good); }
  .analysis-col.improves h4 { color: var(--bad); }
  .analysis-col ul {
    list-style: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .analysis-col li {
    font-size: 0.9rem;
    line-height: 1.5;
    padding: 10px 12px;
    background: var(--bg-card);
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .analysis-col.works li { border-left: 3px solid var(--good); }
  .analysis-col.improves li { border-left: 3px solid var(--bad); }

  /* --- Bio-Varianten --- */
  .bios-wrap {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 14px;
  }
  .bio-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 26px;
    box-shadow: var(--shadow-card);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .bio-card:hover {
    border-color: var(--accent-border);
    box-shadow: var(--shadow-card-hover);
  }
  .bio-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .bio-style-badge {
    padding: 5px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .bio-char {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    margin-left: auto;
  }
  .bio-char.over { color: var(--bad); }
  .bio-char.warn { color: #f2c779; }

  .bio-text {
    font-size: 1rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    padding: 16px 18px;
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    font-family: inherit;
  }

  .bio-why {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    font-size: 0.86rem;
    line-height: 1.5;
    color: var(--text-muted);
  }
  .bio-why .why-label {
    display: block;
    font-size: 0.66rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }

  .bio-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.copied { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* --- Highlights --- */
  .highlights-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 26px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .highlights-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .highlight-item {
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.15s;
  }
  .highlight-item:hover { border-color: var(--accent-border); }
  .highlight-item .h-title {
    display: block;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }
  .highlight-item .h-purpose {
    display: block;
    font-size: 0.84rem;
    color: var(--text-muted);
    line-height: 1.45;
  }

  /* ---------- Loading / Error ---------- */
  .loading {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.3);
    color: #ff9b9b;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 0.92rem;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
  }
  footer .powered { color: var(--text-muted); font-weight: 500; }
  footer .powered .name { color: var(--accent); font-weight: 600; }

  @media (max-width: 560px) {
    body { padding: 32px 16px 32px; }
    h1 { font-size: 2rem; }
    .card { padding: 24px 20px; }
    .analysis-card, .bio-card, .highlights-card { padding: 20px 18px; }
    .analysis-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <nav class="topnav">
    <a href="index.html">Hooks &amp; Marktrecherche</a>
    <a href="caption.html">Caption Creator</a>
    <a href="carousel.html">Carousel Planner</a>
    <a href="pillars.html">Content-Säulen</a>
    <a href="stories.html">Story-Sequenz</a>
    <a href="tool-ideen.html">Tool-Ideen</a>
  </nav>

  <header>
    <span class="eyebrow"><span class="brand-dot"></span>Bio-Optimierer</span>
    <h1>Bio-Optimierer.</h1>
    <p class="subtitle">Kurze Analyse deiner aktuellen Instagram-Bio plus 3 optimierte Varianten in 3 Stilen — alle unter 150 Zeichen.</p>
  </header>

  <form class="card" id="bioForm" onsubmit="return false;">

    <div class="field">
      <label for="b-niche">Nische</label>
      <select id="b-niche">
        <option>Business &amp; Entrepreneurship</option>
        <option>Mindset &amp; Persönlichkeitsentwicklung</option>
        <option>Fitness &amp; Gesundheit</option>
        <option>Ernährung</option>
        <option>Beziehung &amp; Partnerschaft</option>
        <option>Finanzen &amp; Investieren</option>
        <option>Karriere &amp; Berufung</option>
        <option>Spiritualität &amp; Selbstfindung</option>
        <option>Social Media &amp; Marketing</option>
        <option>Life Coaching &amp; Selbstliebe</option>
      </select>
    </div>

    <div class="field">
      <label for="b-audience">Zielgruppe</label>
      <textarea id="b-audience" placeholder="Wem hilfst du genau? z.B. 'Selbstständige Frauen 28–40, die ihr Coaching-Business auf 5-stellige Monate skalieren wollen'"></textarea>
    </div>

    <div class="field">
      <label for="b-offer">Dein Angebot</label>
      <textarea id="b-offer" placeholder="Was bietest du an? z.B. '1:1 Business-Mentoring, 3 Monate, Fokus Positionierung &amp; Sales'"></textarea>
    </div>

    <div class="field">
      <div class="field-head">
        <label for="b-current">Deine aktuelle Bio</label>
        <span class="char-counter" id="currentCounter">0 / 150</span>
      </div>
      <textarea id="b-current" class="bio-textarea" placeholder="Kopier hier deine aktuelle Instagram-Bio rein — so, wie sie im Moment auf deinem Profil steht (inkl. Zeilenumbrüche und Emojis)."></textarea>
    </div>

    <button class="primary" id="bioBtn" type="submit">Bio optimieren</button>
  </form>

  <div class="results" id="bioResults">
    <div class="results-header">
      <h2>Deine optimierten Bios</h2>
    </div>
    <div id="bioContainer"></div>
  </div>

  <footer>
    <span class="powered">Powered by <span class="name">Sabrina</span></span>
  </footer>

</div>

<script>
const API_ENDPOINT = '/api/bio';
const MAX_CHARS = 150;

// ============================================================
// LIVE-COUNTER FÜR AKTUELLE BIO
// ============================================================
const currentField = document.getElementById('b-current');
const currentCounter = document.getElementById('currentCounter');

function updateCounter() {
  const text = currentField.value;
  const count = Array.from(text).length;
  currentCounter.textContent = `${count} / ${MAX_CHARS}`;
  currentCounter.classList.remove('over', 'warn');
  if (count > MAX_CHARS) currentCounter.classList.add('over');
  else if (count > MAX_CHARS - 20) currentCounter.classList.add('warn');
}
currentField.addEventListener('input', updateCounter);
updateCounter();

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

const STYLE_LABEL = {
  professionell: 'Professionell',
  persoenlich: 'Persönlich',
  playful: 'Playful',
};
function styleLabel(s) { return STYLE_LABEL[s] || s; }

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Kopiert ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1400);
  }).catch(() => {
    alert('Konnte nicht kopiert werden. Bitte manuell markieren und kopieren.');
  });
}

function charClass(count) {
  if (count > MAX_CHARS) return 'over';
  if (count > MAX_CHARS - 20) return 'warn';
  return '';
}

// ============================================================
// FORM-SUBMIT
// ============================================================
const form = document.getElementById('bioForm');
const btn = document.getElementById('bioBtn');
const resultsBox = document.getElementById('bioResults');
const container = document.getElementById('bioContainer');

form.addEventListener('submit', generate);
btn.addEventListener('click', generate);

async function generate(e) {
  if (e) e.preventDefault();

  const niche = document.getElementById('b-niche').value;
  const audience = document.getElementById('b-audience').value.trim();
  const offer = document.getElementById('b-offer').value.trim();
  const currentBio = document.getElementById('b-current').value.trim();

  if (!audience) {
    resultsBox.classList.add('show');
    container.innerHTML = '<div class="error">Bitte fülle das Feld "Zielgruppe" aus.</div>';
    document.getElementById('b-audience').focus();
    return;
  }
  if (!offer) {
    resultsBox.classList.add('show');
    container.innerHTML = '<div class="error">Bitte fülle das Feld "Dein Angebot" aus.</div>';
    document.getElementById('b-offer').focus();
    return;
  }
  if (!currentBio) {
    resultsBox.classList.add('show');
    container.innerHTML = '<div class="error">Bitte gib deine aktuelle Bio ein — das Tool ist ein Optimierer.</div>';
    document.getElementById('b-current').focus();
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Optimiere …';
  resultsBox.classList.add('show');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Deine Bio wird optimiert …</div></div>';

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ niche, audience, offer, currentBio }),
    });
    const data = await res.json();

    if (!res.ok) {
      container.innerHTML = `<div class="error">Fehler: ${escapeHtml(data.error || ('HTTP ' + res.status))}</div>`;
      return;
    }

    if (!data.bios || !Array.isArray(data.bios) || data.bios.length === 0) {
      const rawPreview = (data.raw || '').trim().slice(0, 600);
      container.innerHTML = `
        <div class="error">
          <strong>Die Antwort konnte nicht interpretiert werden.</strong><br>
          Bitte einmal auf "Bio optimieren" klicken und erneut versuchen.
          ${rawPreview ? `<details style="margin-top:10px;"><summary style="cursor:pointer;opacity:0.8;">Rohausgabe anzeigen (für Debug)</summary><pre style="margin-top:10px;white-space:pre-wrap;font-size:0.82rem;opacity:0.85;">${escapeHtml(rawPreview)}</pre></details>` : ''}
        </div>`;
      return;
    }

    render(data);
  } catch (err) {
    container.innerHTML = `<div class="error">Netzwerkfehler: ${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Bio optimieren';
  }
}

function render(data) {
  const bios = data.bios || [];
  const analysis = data.analysis || null;
  const highlights = Array.isArray(data.highlights) ? data.highlights : [];

  let html = '';

  // --- Analyse ---
  if (analysis && ((analysis.works && analysis.works.length) || (analysis.improves && analysis.improves.length))) {
    html += `
      <div class="analysis-card">
        <div class="analysis-title">Analyse deiner aktuellen Bio</div>
        <div class="analysis-grid">
          <div class="analysis-col works">
            <h4>✓ Was funktioniert</h4>
            <ul>
              ${(analysis.works || []).map(w => `<li>${escapeHtml(w)}</li>`).join('')}
            </ul>
          </div>
          <div class="analysis-col improves">
            <h4>✗ Was fehlt / verwässert</h4>
            <ul>
              ${(analysis.improves || []).map(w => `<li>${escapeHtml(w)}</li>`).join('')}
            </ul>
          </div>
        </div>
      </div>
    `;
  }

  // --- Bios ---
  html += '<div class="bios-wrap">';
  bios.forEach((bio, i) => {
    const cls = charClass(bio.char_count);
    html += `
      <div class="bio-card">
        <div class="bio-head">
          <span class="bio-style-badge">${escapeHtml(styleLabel(bio.style))}</span>
          <span class="bio-char ${cls}">${bio.char_count} / ${MAX_CHARS}</span>
        </div>
        <div class="bio-text">${escapeHtml(bio.text)}</div>
        ${bio.why ? `
          <div class="bio-why">
            <span class="why-label">Warum diese Variante</span>
            <span>${escapeHtml(bio.why)}</span>
          </div>
        ` : ''}
        <div class="bio-actions">
          <button class="action-btn" data-bio-copy="${i}">Bio kopieren</button>
        </div>
      </div>
    `;
  });
  html += '</div>';

  // --- Highlights ---
  if (highlights.length) {
    html += `
      <div class="highlights-card">
        <div class="analysis-title">Highlight-Story-Ideen</div>
        <div class="highlights-list">
          ${highlights.map(h => `
            <div class="highlight-item">
              <span class="h-title">${escapeHtml(h.title)}</span>
              <span class="h-purpose">${escapeHtml(h.purpose)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  container.innerHTML = html;

  // --- Copy-Handler ---
  container.querySelectorAll('[data-bio-copy]').forEach(b => {
    b.addEventListener('click', () => {
      const idx = parseInt(b.dataset.bioCopy, 10);
      const bio = bios[idx];
      if (!bio) return;
      copyText(bio.text, b);
    });
  });
}
</script>
</body>
</html>
