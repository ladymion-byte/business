<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #100012;
    --bg-elevated: #1a0220;
    --bg-card: #1f0428;
    --accent: #e98b9e;
    --accent-soft: rgba(233, 139, 158, 0.12);
    --accent-border: rgba(233, 139, 158, 0.25);
    --btn: #950032;
    --btn-hover: #b30040;
    --text: #f5ecef;
    --text-muted: #a89199;
    --text-dim: #6b5862;
    --border: rgba(233, 139, 158, 0.15);

    --shadow-card:
      0 1px 0 rgba(233, 139, 158, 0.04) inset,
      0 14px 34px -16px rgba(0, 0, 0, 0.75),
      0 28px 60px -28px rgba(149, 0, 50, 0.35);
    --shadow-card-hover:
      0 1px 0 rgba(233, 139, 158, 0.08) inset,
      0 18px 40px -16px rgba(0, 0, 0, 0.85),
      0 34px 70px -28px rgba(149, 0, 50, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 48px 24px 32px;
    background:
      radial-gradient(circle at 20% 0%, rgba(149, 0, 50, 0.18), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(233, 139, 158, 0.1), transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }

  .container { max-width: 760px; margin: 0 auto; }

  /* ---------- Top Nav ---------- */
  .topnav {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
  }
  .topnav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    transition: color 0.15s, border-color 0.15s;
  }
  .topnav a:hover {
    color: var(--accent);
    border-color: var(--accent-border);
  }
  .topnav a::before {
    content: '←  ';
    color: var(--text-dim);
  }
  .topnav a:hover::before { color: var(--accent); }

  header {
    text-align: center;
    margin-bottom: 34px;
  }

  .brand-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    box-shadow: 0 0 16px var(--accent);
  }

  .eyebrow {
    display: inline-block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1.02rem;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ---------- Karte ---------- */
  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-card);
  }

  .field { margin-bottom: 22px; }
  .field:last-of-type { margin-bottom: 28px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .label-optional {
    color: var(--text-dim);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.8rem;
    margin-left: 8px;
  }

  input[type="text"], textarea, select {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 0.98rem;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
  select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23e98b9e' stroke-width='2.5'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 44px;
    cursor: pointer;
  }
  select option { background: var(--bg-card); color: var(--text); }

  /* ---------- Option-Buttons (Ziel, Ton, Länge) ---------- */
  .option-group {
    display: grid;
    gap: 8px;
  }
  .option-group.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .option-group.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .option-group.cols-2 { grid-template-columns: repeat(2, 1fr); }

  .option-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 14px 10px;
    background: var(--bg-card);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.25;
  }
  .option-btn .sub {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .option-btn:hover {
    color: var(--text);
    border-color: var(--accent-border);
  }
  .option-btn.active {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .option-btn.active .sub { color: var(--accent); opacity: 0.85; }

  button.primary {
    width: 100%;
    padding: 16px 22px;
    background: var(--btn);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  button.primary:hover:not(:disabled) {
    background: var(--btn-hover);
    box-shadow: 0 8px 24px rgba(149, 0, 50, 0.4);
    transform: translateY(-1px);
  }
  button.primary:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---------- Ergebnis ---------- */
  .results { display: none; margin-top: 10px; }
  .results.show { display: block; }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .results-header h2 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .results-header .meta {
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .caption-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 26px 28px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }

  .caption-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .badge {
    display: inline-block;
    padding: 5px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .caption-section {
    margin-bottom: 22px;
  }
  .caption-section:last-child { margin-bottom: 0; }

  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--accent);
  }

  .caption-text {
    font-size: 1.02rem;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    padding: 18px 20px;
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .cta-box {
    padding: 16px 18px;
    background: var(--bg-card);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.98rem;
    line-height: 1.55;
  }

  .hashtags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .hashtag {
    font-size: 0.85rem;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .caption-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.copied { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ---------- Loading / Error ---------- */
  .loading {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.3);
    color: #ff9b9b;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 0.92rem;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
  }
  footer .powered { color: var(--text-muted); font-weight: 500; }
  footer .powered .name { color: var(--accent); font-weight: 600; }

  @media (max-width: 560px) {
    body { padding: 32px 16px 32px; }
    h1 { font-size: 2rem; }
    .card { padding: 24px 20px; }
    .caption-card { padding: 22px 20px; }
    .option-group.cols-4 { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <nav class="topnav">
    <a href="index.html">Hooks &amp; Marktrecherche</a>
  </nav>

  <header>
    <span class="eyebrow"><span class="brand-dot"></span>Caption Creator</span>
    <h1>Caption Creator.</h1>
    <p class="subtitle">Komplette Instagram-Captions nach Ziel, Ton und Länge — inklusive Call-to-Action und passender Hashtag-Auswahl.</p>
  </header>

  <form class="card" id="captionForm" onsubmit="return false;">

    <div class="field">
      <label for="c-niche">Nische</label>
      <select id="c-niche">
        <option>Business &amp; Entrepreneurship</option>
        <option>Mindset &amp; Persönlichkeitsentwicklung</option>
        <option>Fitness &amp; Gesundheit</option>
        <option>Ernährung</option>
        <option>Beziehung &amp; Partnerschaft</option>
        <option>Finanzen &amp; Investieren</option>
        <option>Karriere &amp; Berufung</option>
        <option>Spiritualität &amp; Selbstfindung</option>
        <option>Social Media &amp; Marketing</option>
        <option>Life Coaching &amp; Selbstliebe</option>
      </select>
    </div>

    <div class="field">
      <label for="c-topic">Thema des Posts</label>
      <textarea id="c-topic" placeholder="Worum geht's? z.B. 'Warum Disziplin überschätzt wird und was wirklich zählt'"></textarea>
    </div>

    <div class="field">
      <label>Ziel der Caption</label>
      <div class="option-group cols-4" id="goalGroup" role="radiogroup">
        <button type="button" class="option-btn active" data-value="saves" role="radio" aria-checked="true">
          Saves
          <span class="sub">Abspeichern</span>
        </button>
        <button type="button" class="option-btn" data-value="comments" role="radio" aria-checked="false">
          Kommentare
          <span class="sub">Dialog</span>
        </button>
        <button type="button" class="option-btn" data-value="dms" role="radio" aria-checked="false">
          DMs
          <span class="sub">Direktnachrichten</span>
        </button>
        <button type="button" class="option-btn" data-value="shares" role="radio" aria-checked="false">
          Shares
          <span class="sub">Weiterleiten</span>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Tonalität</label>
      <div class="option-group cols-2" id="toneGroup" role="radiogroup">
        <button type="button" class="option-btn active" data-value="personal" role="radio" aria-checked="true">
          Persönlich &amp; nahbar
          <span class="sub">Storytelling, Einblicke, emotional</span>
        </button>
        <button type="button" class="option-btn" data-value="inspiring" role="radio" aria-checked="false">
          Inspirierend &amp; motivierend
          <span class="sub">Transformation, Empowerment</span>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Länge</label>
      <div class="option-group cols-3" id="lengthGroup" role="radiogroup">
        <button type="button" class="option-btn" data-value="short" role="radio" aria-checked="false">
          Kurz
          <span class="sub">~50 Wörter</span>
        </button>
        <button type="button" class="option-btn active" data-value="medium" role="radio" aria-checked="true">
          Mittel
          <span class="sub">~120 Wörter</span>
        </button>
        <button type="button" class="option-btn" data-value="long" role="radio" aria-checked="false">
          Lang
          <span class="sub">~250 Wörter</span>
        </button>
      </div>
    </div>

    <button class="primary" id="captionBtn" type="submit">Caption generieren</button>
  </form>

  <div class="results" id="captionResults">
    <div class="results-header">
      <h2>Deine Caption</h2>
      <span class="meta" id="captionMeta"></span>
    </div>
    <div id="captionContainer"></div>
  </div>

  <footer>
    <span class="powered">Powered by <span class="name">Sabrina</span></span>
  </footer>

</div>

<script>
const API_ENDPOINT = '/api/caption';

// ============================================================
// OPTION-BUTTON-GRUPPEN
// ============================================================
function setupOptionGroup(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return;
  group.addEventListener('click', (e) => {
    const btn = e.target.closest('.option-btn');
    if (!btn) return;
    group.querySelectorAll('.option-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-checked', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-checked', 'true');
  });
}
setupOptionGroup('goalGroup');
setupOptionGroup('toneGroup');
setupOptionGroup('lengthGroup');

function getSelected(groupId) {
  const group = document.getElementById(groupId);
  const active = group.querySelector('.option-btn.active');
  return active ? active.dataset.value : null;
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function goalLabel(g) {
  return ({ saves: 'Saves', comments: 'Kommentare', dms: 'DMs', shares: 'Shares' })[g] || g;
}
function toneLabel(t) {
  return ({ personal: 'Persönlich & nahbar', inspiring: 'Inspirierend & motivierend' })[t] || t;
}
function lengthLabel(l) {
  return ({ short: 'Kurz', medium: 'Mittel', long: 'Lang' })[l] || l;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Kopiert ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1400);
  }).catch(() => {
    alert('Konnte nicht kopiert werden. Bitte manuell markieren und kopieren.');
  });
}

// ============================================================
// FORM-SUBMIT
// ============================================================
const form = document.getElementById('captionForm');
const btn = document.getElementById('captionBtn');
const resultsBox = document.getElementById('captionResults');
const container = document.getElementById('captionContainer');
const metaEl = document.getElementById('captionMeta');

form.addEventListener('submit', generateCaption);
btn.addEventListener('click', generateCaption);

async function generateCaption(e) {
  if (e) e.preventDefault();

  const niche = document.getElementById('c-niche').value;
  const topic = document.getElementById('c-topic').value.trim();
  const goal = getSelected('goalGroup');
  const tone = getSelected('toneGroup');
  const length = getSelected('lengthGroup');

  if (!topic) {
    resultsBox.classList.add('show');
    container.innerHTML = '<div class="error">Bitte gib ein Thema für den Post an.</div>';
    document.getElementById('c-topic').focus();
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Generiere …';
  resultsBox.classList.add('show');
  metaEl.textContent = '';
  container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Caption wird erstellt …</div></div>';

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ niche, topic, goal, tone, length }),
    });
    const data = await res.json();

    if (!res.ok) {
      container.innerHTML = `<div class="error">Fehler: ${escapeHtml(data.error || ('HTTP ' + res.status))}</div>`;
      return;
    }

    if (!data.caption || !data.caption.text) {
      container.innerHTML = '<div class="error">Die Antwort konnte nicht interpretiert werden. Bitte erneut versuchen.</div>';
      return;
    }

    renderCaption(data.caption, { goal, tone, length });
  } catch (err) {
    container.innerHTML = `<div class="error">Netzwerkfehler: ${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Caption generieren';
  }
}

function renderCaption(cap, opts) {
  const hashtags = Array.isArray(cap.hashtags) ? cap.hashtags : [];
  const hashtagsText = hashtags.map(h => h.startsWith('#') ? h : '#' + h).join(' ');
  const fullText = cap.text + (cap.cta ? '\n\n' + cap.cta : '') + (hashtagsText ? '\n\n' + hashtagsText : '');

  metaEl.textContent = `${goalLabel(opts.goal)} · ${toneLabel(opts.tone)} · ${lengthLabel(opts.length)}`;

  container.innerHTML = `
    <div class="caption-card">
      <div class="caption-top">
        <span class="badge">${escapeHtml(goalLabel(opts.goal))}</span>
        <span class="badge">${escapeHtml(toneLabel(opts.tone))}</span>
        <span class="badge">${escapeHtml(lengthLabel(opts.length))}</span>
      </div>

      <div class="caption-section">
        <div class="section-title">Caption</div>
        <div class="caption-text" id="captionTextEl">${escapeHtml(cap.text)}</div>
      </div>

      ${cap.cta ? `
        <div class="caption-section">
          <div class="section-title">Call-to-Action</div>
          <div class="cta-box" id="ctaTextEl">${escapeHtml(cap.cta)}</div>
        </div>
      ` : ''}

      ${hashtags.length ? `
        <div class="caption-section">
          <div class="section-title">Hashtags</div>
          <div class="hashtags">
            ${hashtags.map(h => `<span class="hashtag">${escapeHtml(h.startsWith('#') ? h : '#' + h)}</span>`).join('')}
          </div>
        </div>
      ` : ''}

      <div class="caption-actions">
        <button class="action-btn" data-copy="full">Komplett kopieren</button>
        <button class="action-btn" data-copy="caption">Nur Caption</button>
        ${hashtags.length ? '<button class="action-btn" data-copy="hashtags">Nur Hashtags</button>' : ''}
      </div>
    </div>
  `;

  container.querySelectorAll('.action-btn').forEach(b => {
    b.addEventListener('click', () => {
      const kind = b.dataset.copy;
      let payload = '';
      if (kind === 'full') payload = fullText;
      else if (kind === 'caption') payload = cap.text + (cap.cta ? '\n\n' + cap.cta : '');
      else if (kind === 'hashtags') payload = hashtagsText;
      copyText(payload, b);
    });
  });
}
</script>
</body>
</html>
