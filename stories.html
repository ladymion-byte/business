<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story-Sequenz Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #100012;
    --bg-elevated: #1a0220;
    --bg-card: #1f0428;
    --accent: #e98b9e;
    --accent-soft: rgba(233, 139, 158, 0.12);
    --accent-border: rgba(233, 139, 158, 0.25);
    --btn: #950032;
    --btn-hover: #b30040;
    --text: #f5ecef;
    --text-muted: #a89199;
    --text-dim: #6b5862;
    --border: rgba(233, 139, 158, 0.15);

    --shadow-card:
      0 1px 0 rgba(233, 139, 158, 0.04) inset,
      0 14px 34px -16px rgba(0, 0, 0, 0.75),
      0 28px 60px -28px rgba(149, 0, 50, 0.35);
    --shadow-card-hover:
      0 1px 0 rgba(233, 139, 158, 0.08) inset,
      0 18px 40px -16px rgba(0, 0, 0, 0.85),
      0 34px 70px -28px rgba(149, 0, 50, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 48px 24px 32px;
    background:
      radial-gradient(circle at 20% 0%, rgba(149, 0, 50, 0.18), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(233, 139, 158, 0.1), transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }

  .container { max-width: 820px; margin: 0 auto; }

  .topnav {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .topnav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    transition: color 0.15s, border-color 0.15s;
  }
  .topnav a:hover { color: var(--accent); border-color: var(--accent-border); }
  .topnav a::before { content: '←  '; color: var(--text-dim); }
  .topnav a:hover::before { color: var(--accent); }

  header { text-align: center; margin-bottom: 34px; }

  .brand-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    box-shadow: 0 0 16px var(--accent);
  }

  .eyebrow {
    display: inline-block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  h1 { font-size: 2.6rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 10px; line-height: 1.1; }

  .subtitle { color: var(--text-muted); font-size: 1.02rem; max-width: 540px; margin: 0 auto; }

  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-card);
  }

  .field { margin-bottom: 22px; }
  .field:last-of-type { margin-bottom: 28px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  input[type="text"], textarea, select {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 0.98rem;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
  select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23e98b9e' stroke-width='2.5'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 44px;
    cursor: pointer;
  }
  select option { background: var(--bg-card); color: var(--text); }

  .option-group { display: grid; gap: 8px; }
  .option-group.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .option-group.cols-3 { grid-template-columns: repeat(3, 1fr); }

  .option-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    padding: 14px 10px;
    background: var(--bg-card);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.25;
  }
  .option-btn .sub { font-size: 0.72rem; color: var(--text-dim); font-weight: 400; }
  .option-btn:hover { color: var(--text); border-color: var(--accent-border); }
  .option-btn.active {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .option-btn.active .sub { color: var(--accent); opacity: 0.85; }

  button.primary {
    width: 100%;
    padding: 16px 22px;
    background: var(--btn);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  button.primary:hover:not(:disabled) {
    background: var(--btn-hover);
    box-shadow: 0 8px 24px rgba(149, 0, 50, 0.4);
    transform: translateY(-1px);
  }
  button.primary:disabled { opacity: 0.55; cursor: not-allowed; }

  /* ---------- Ergebnis ---------- */
  .results { display: none; margin-top: 10px; }
  .results.show { display: block; }

  .results-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding: 0 4px;
    flex-wrap: wrap; gap: 8px;
  }
  .results-header h2 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .results-header .meta { font-size: 0.8rem; color: var(--text-dim); }

  /* ---------- Story-Grid ---------- */
  .stories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
    margin-bottom: 14px;
  }

  .story-card {
    position: relative;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 0;
    box-shadow: var(--shadow-card);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .story-card:hover {
    border-color: var(--accent-border);
    box-shadow: var(--shadow-card-hover);
    transform: translateY(-2px);
  }

  /* Phone-like aspect ratio (9:16) for the upper section */
  .story-frame {
    aspect-ratio: 9 / 16;
    background:
      linear-gradient(160deg, rgba(233, 139, 158, 0.18), rgba(149, 0, 50, 0.18)),
      var(--bg-card);
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    position: relative;
    border-bottom: 1px solid var(--border);
  }

  .story-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: auto;
  }
  .story-num {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.55);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.04em;
  }
  .story-role {
    padding: 3px 10px;
    background: rgba(0, 0, 0, 0.55);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 999px;
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .story-overlay {
    font-size: 1.02rem;
    font-weight: 600;
    line-height: 1.35;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    text-align: center;
    padding: 12px 4px;
    margin: auto 0;
    word-wrap: break-word;
  }

  .sticker-preview {
    margin-top: auto;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 0.72rem;
    color: #fff;
    backdrop-filter: blur(4px);
    text-align: center;
  }
  .sticker-preview .sticker-label {
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 3px;
  }
  .sticker-preview .sticker-body { font-weight: 500; line-height: 1.3; }
  .sticker-preview .poll-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 4px;
  }
  .sticker-preview .poll-option {
    background: rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 0.7rem;
  }

  /* --- Below frame: meta info --- */
  .story-meta {
    padding: 14px 16px;
    background: var(--bg-elevated);
  }
  .meta-item {
    font-size: 0.82rem;
    line-height: 1.45;
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .meta-item:last-child { border-bottom: none; padding-bottom: 0; }
  .meta-item:first-child { padding-top: 0; }
  .meta-item .meta-label {
    font-size: 0.64rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .meta-item .meta-val { color: var(--text); font-size: 0.88rem; }

  /* Role-based accent colors for the top border hint */
  .story-card[data-role="opener"] { border-top: 3px solid var(--accent); }
  .story-card[data-role="cta"] { border-top: 3px solid #9fd4a8; }
  .story-card[data-role="build"] { border-top: 3px solid rgba(233, 139, 158, 0.3); }

  /* ---------- Actions ---------- */
  .seq-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px 18px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.copied { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ---------- Loading / Error ---------- */
  .loading { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .spinner {
    display: inline-block;
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.3);
    color: #ff9b9b;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 0.92rem;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
  }
  footer .powered { color: var(--text-muted); font-weight: 500; }
  footer .powered .name { color: var(--accent); font-weight: 600; }

  @media (max-width: 560px) {
    body { padding: 32px 16px 32px; }
    h1 { font-size: 2rem; }
    .card { padding: 24px 20px; }
    .option-group.cols-4 { grid-template-columns: repeat(2, 1fr); }
    .stories-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <nav class="topnav">
    <a href="index.html">Hooks &amp; Marktrecherche</a>
    <a href="caption.html">Caption Creator</a>
    <a href="carousel.html">Carousel Planner</a>
    <a href="bio.html">Bio-Optimierer</a>
    <a href="pillars.html">Content-Säulen</a>
    <a href="tool-ideen.html">Tool-Ideen</a>
  </nav>

  <header>
    <span class="eyebrow"><span class="brand-dot"></span>Story-Sequenz</span>
    <h1>Story-Sequenz.</h1>
    <p class="subtitle">Komplette Instagram-Story-Serien in einem Rutsch — Overlay-Text, Visual-Vorschlag und Sticker-Empfehlungen für jede Story.</p>
  </header>

  <form class="card" id="storyForm" onsubmit="return false;">

    <div class="field">
      <label for="s-niche">Nische</label>
      <select id="s-niche">
        <option>Business &amp; Entrepreneurship</option>
        <option>Mindset &amp; Persönlichkeitsentwicklung</option>
        <option>Fitness &amp; Gesundheit</option>
        <option>Ernährung</option>
        <option>Beziehung &amp; Partnerschaft</option>
        <option>Finanzen &amp; Investieren</option>
        <option>Karriere &amp; Berufung</option>
        <option>Spiritualität &amp; Selbstfindung</option>
        <option>Social Media &amp; Marketing</option>
        <option>Life Coaching &amp; Selbstliebe</option>
      </select>
    </div>

    <div class="field">
      <label for="s-topic">Thema der Story-Sequenz</label>
      <textarea id="s-topic" placeholder="Worum geht's? z.B. 'Was heute in meinem Business-Call passiert ist' oder 'Warum mein Launch geflopt ist und was ich jetzt anders mache'"></textarea>
    </div>

    <div class="field">
      <label>Ziel der Sequenz</label>
      <div class="option-group cols-4" id="goalGroup" role="radiogroup">
        <button type="button" class="option-btn active" data-value="engagement" role="radio" aria-checked="true">
          Engagement
          <span class="sub">Antworten &amp; Umfragen</span>
        </button>
        <button type="button" class="option-btn" data-value="dms" role="radio" aria-checked="false">
          DMs
          <span class="sub">Gespräche öffnen</span>
        </button>
        <button type="button" class="option-btn" data-value="link" role="radio" aria-checked="false">
          Link-Klicks
          <span class="sub">Auf Angebot lenken</span>
        </button>
        <button type="button" class="option-btn" data-value="launch" role="radio" aria-checked="false">
          Launch
          <span class="sub">Verkauf vorbereiten</span>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Anzahl Stories</label>
      <div class="option-group cols-3" id="countGroup" role="radiogroup">
        <button type="button" class="option-btn" data-value="5" role="radio" aria-checked="false">
          5 Stories
          <span class="sub">Kompakt</span>
        </button>
        <button type="button" class="option-btn active" data-value="8" role="radio" aria-checked="true">
          8 Stories
          <span class="sub">Ausgewogen</span>
        </button>
        <button type="button" class="option-btn" data-value="12" role="radio" aria-checked="false">
          12 Stories
          <span class="sub">Storytelling-Serie</span>
        </button>
      </div>
    </div>

    <button class="primary" id="storyBtn" type="submit">Story-Sequenz generieren</button>
  </form>

  <div class="results" id="storyResults">
    <div class="results-header">
      <h2>Deine Story-Sequenz</h2>
      <span class="meta" id="storyMeta"></span>
    </div>
    <div id="storyContainer"></div>
  </div>

  <footer>
    <span class="powered">Powered by <span class="name">Sabrina</span></span>
  </footer>

</div>

<script>
const API_ENDPOINT = '/api/stories';

const GOAL_LABEL = {
  engagement: 'Engagement',
  dms: 'DMs',
  link: 'Link-Klicks',
  launch: 'Launch',
};

const STICKER_LABEL = {
  poll: 'Umfrage',
  question: 'Frage-Sticker',
  quiz: 'Quiz',
  slider: 'Emoji-Slider',
  countdown: 'Countdown',
  link: 'Link-Sticker',
  music: 'Musik',
  none: 'Kein Sticker',
};

const ROLE_LABEL = {
  opener: 'Opener',
  build: 'Aufbau',
  cta: 'CTA',
};

// ============================================================
// OPTION-GROUPS
// ============================================================
function setupOptionGroup(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return;
  group.addEventListener('click', (e) => {
    const btn = e.target.closest('.option-btn');
    if (!btn) return;
    group.querySelectorAll('.option-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-checked', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-checked', 'true');
  });
}
setupOptionGroup('goalGroup');
setupOptionGroup('countGroup');

function getSelected(groupId) {
  const group = document.getElementById(groupId);
  const active = group.querySelector('.option-btn.active');
  return active ? active.dataset.value : null;
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Kopiert ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1400);
  }).catch(() => {
    alert('Konnte nicht kopiert werden. Bitte manuell markieren und kopieren.');
  });
}

// Sticker-Preview HTML für Innerhalb des Story-Frames
function renderStickerPreview(sticker, data) {
  if (!sticker || sticker === 'none') return '';
  data = data || {};

  if (sticker === 'poll') {
    const opts = Array.isArray(data.poll_options) ? data.poll_options : [];
    return `
      <div class="sticker-preview">
        <span class="sticker-label">Umfrage</span>
        <div class="poll-options">
          ${opts.map(o => `<span class="poll-option">${escapeHtml(o)}</span>`).join('')}
        </div>
      </div>`;
  }
  if (sticker === 'question') {
    return `
      <div class="sticker-preview">
        <span class="sticker-label">Frage-Sticker</span>
        <div class="sticker-body">${escapeHtml(data.question_prompt || '')}</div>
      </div>`;
  }
  if (sticker === 'quiz') {
    const q = data.quiz || {};
    const opts = Array.isArray(q.options) ? q.options : [];
    const correct = typeof q.correct_index === 'number' ? q.correct_index : -1;
    return `
      <div class="sticker-preview">
        <span class="sticker-label">Quiz</span>
        <div class="sticker-body">${escapeHtml(q.question || '')}</div>
        <div class="poll-options" style="grid-template-columns:1fr;">
          ${opts.map((o, i) => `<span class="poll-option">${i === correct ? '✓ ' : ''}${escapeHtml(o)}</span>`).join('')}
        </div>
      </div>`;
  }
  if (sticker === 'slider') {
    const s = data.slider || {};
    return `
      <div class="sticker-preview">
        <span class="sticker-label">Slider ${s.emoji || ''}</span>
        <div class="sticker-body">${escapeHtml(s.question || '')}</div>
      </div>`;
  }
  if (sticker === 'countdown') {
    return `
      <div class="sticker-preview">
        <span class="sticker-label">Countdown</span>
        <div class="sticker-body">${escapeHtml(data.countdown_label || '')}</div>
      </div>`;
  }
  if (sticker === 'link') {
    return `
      <div class="sticker-preview">
        <span class="sticker-label">Link-Sticker</span>
        <div class="sticker-body">${escapeHtml(data.link_text || '')}</div>
      </div>`;
  }
  if (sticker === 'music') {
    return `
      <div class="sticker-preview">
        <span class="sticker-label">🎵 Musik</span>
      </div>`;
  }
  return '';
}

// Sticker-Details für Meta-Block (ausführlich)
function stickerDetails(sticker, data) {
  if (!sticker || sticker === 'none') return 'Kein Sticker auf dieser Story.';
  data = data || {};
  if (sticker === 'poll') {
    const opts = Array.isArray(data.poll_options) ? data.poll_options : [];
    return `Umfrage-Optionen: "${opts.join('" / "')}"`;
  }
  if (sticker === 'question') return `Frage-Prompt: "${data.question_prompt || ''}"`;
  if (sticker === 'quiz') {
    const q = data.quiz || {};
    return `${q.question || ''} · Richtige Antwort: Option ${(q.correct_index ?? -1) + 1}`;
  }
  if (sticker === 'slider') {
    const s = data.slider || {};
    return `${s.question || ''} ${s.emoji || ''}`;
  }
  if (sticker === 'countdown') return `Countdown-Label: "${data.countdown_label || ''}"`;
  if (sticker === 'link') return `Button-Text: "${data.link_text || ''}"`;
  if (sticker === 'music') return 'Musik-Sticker (passenden Track manuell wählen)';
  return '';
}

// ============================================================
// FORM-SUBMIT
// ============================================================
const form = document.getElementById('storyForm');
const btn = document.getElementById('storyBtn');
const resultsBox = document.getElementById('storyResults');
const container = document.getElementById('storyContainer');
const metaEl = document.getElementById('storyMeta');

form.addEventListener('submit', generate);
btn.addEventListener('click', generate);

async function generate(e) {
  if (e) e.preventDefault();

  const niche = document.getElementById('s-niche').value;
  const topic = document.getElementById('s-topic').value.trim();
  const goal = getSelected('goalGroup');
  const storyCount = parseInt(getSelected('countGroup'), 10);

  if (!topic) {
    resultsBox.classList.add('show');
    container.innerHTML = '<div class="error">Bitte gib ein Thema für die Story-Sequenz an.</div>';
    document.getElementById('s-topic').focus();
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Generiere …';
  resultsBox.classList.add('show');
  metaEl.textContent = '';
  container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Story-Sequenz wird geplant …</div></div>';

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ niche, topic, goal, storyCount }),
    });
    const data = await res.json();

    if (!res.ok) {
      container.innerHTML = `<div class="error">Fehler: ${escapeHtml(data.error || ('HTTP ' + res.status))}</div>`;
      return;
    }

    if (!data.stories || !Array.isArray(data.stories) || data.stories.length === 0) {
      const rawPreview = (data.raw || '').trim().slice(0, 600);
      container.innerHTML = `
        <div class="error">
          <strong>Die Antwort konnte nicht interpretiert werden.</strong><br>
          Bitte einmal auf "Story-Sequenz generieren" klicken und erneut versuchen.
          ${rawPreview ? `<details style="margin-top:10px;"><summary style="cursor:pointer;opacity:0.8;">Rohausgabe anzeigen (für Debug)</summary><pre style="margin-top:10px;white-space:pre-wrap;font-size:0.82rem;opacity:0.85;">${escapeHtml(rawPreview)}</pre></details>` : ''}
        </div>`;
      return;
    }

    render(data, { goal, storyCount });
  } catch (err) {
    container.innerHTML = `<div class="error">Netzwerkfehler: ${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Story-Sequenz generieren';
  }
}

function render(data, opts) {
  const stories = data.stories || [];
  metaEl.textContent = `${GOAL_LABEL[opts.goal] || opts.goal} · ${stories.length} Stories`;

  let html = '';

  // Sequence actions
  html += `
    <div class="seq-actions">
      <button class="action-btn" data-copy="all">Alle Overlay-Texte kopieren</button>
      <button class="action-btn" data-copy="full">Komplette Sequenz kopieren</button>
    </div>
  `;

  // Stories
  html += '<div class="stories-grid">';
  stories.forEach((s, i) => {
    const roleLabel = ROLE_LABEL[s.role] || 'Aufbau';
    const stickerLabel = STICKER_LABEL[s.sticker] || 'Kein Sticker';
    const stickerPreviewHtml = renderStickerPreview(s.sticker, s.sticker_data);
    const stickerMeta = stickerDetails(s.sticker, s.sticker_data);

    html += `
      <div class="story-card" data-role="${s.role || 'build'}">
        <div class="story-frame">
          <div class="story-top">
            <span class="story-num">${String(i + 1).padStart(2, '0')}</span>
            <span class="story-role">${roleLabel}</span>
          </div>
          <div class="story-overlay">${escapeHtml(s.overlay_text || '')}</div>
          ${stickerPreviewHtml}
        </div>
        <div class="story-meta">
          <div class="meta-item">
            <span class="meta-label">Visual</span>
            <span class="meta-val">${escapeHtml(s.visual || '—')}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Sticker · ${escapeHtml(stickerLabel)}</span>
            <span class="meta-val">${escapeHtml(stickerMeta)}</span>
          </div>
        </div>
      </div>
    `;
  });
  html += '</div>';

  container.innerHTML = html;

  // Copy-Handler
  const allOverlays = stories.map((s, i) =>
    `${String(i + 1).padStart(2, '0')}. ${s.overlay_text || ''}`
  ).join('\n');

  const full = stories.map((s, i) => {
    const stickerInfo = s.sticker && s.sticker !== 'none'
      ? `\n   Sticker (${STICKER_LABEL[s.sticker]}): ${stickerDetails(s.sticker, s.sticker_data)}`
      : '';
    return `${String(i + 1).padStart(2, '0')}. [${ROLE_LABEL[s.role] || 'Aufbau'}] ${s.overlay_text || ''}
   Visual: ${s.visual || '—'}${stickerInfo}`;
  }).join('\n\n');

  container.querySelectorAll('[data-copy]').forEach(b => {
    b.addEventListener('click', () => {
      const kind = b.dataset.copy;
      copyText(kind === 'all' ? allOverlays : full, b);
    });
  });
}
</script>
</body>
</html>
